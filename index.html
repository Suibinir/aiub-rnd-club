<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AIUB R&D Club – Login</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="club-logo">
        <img src="IMG/logo.jpg" alt="Club Logo" onerror="this.parentElement.textContent='🎓'"/>
      </div>
      <h1 class="login-title">AIUB R&D Club</h1>
      <p class="login-sub">Sign in to your club member account</p>
      <div class="error-msg" id="errorMsg"></div>
      <div class="form-group">
        <label for="studentId">Student ID</label>
        <input type="text" id="studentId" placeholder="e.g. admin  or  2024-CS-042" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button type="button" class="btn-primary" id="loginBtn">Sign In →</button>
      <p class="demo-hint">
        Powered by <strong>PaperTown Digital</strong> <br>Use Student ID and <code>password</code> as Password to log in.
      </p>
    </div>
  </div>

  <script type="module">
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey:            "AIzaSyCCEfpPzmhIbk9GIt2aYDl6R0gJ4fasfnM",
      authDomain:        "aiub-rnd-club.firebaseapp.com",
      projectId:         "aiub-rnd-club",
      storageBucket:     "aiub-rnd-club.firebasestorage.app",
      messagingSenderId: "652214407284",
      appId:             "1:652214407284:web:1d908b123525099346c121"
    });
    const db = getFirestore(app);

    // If already logged in, go straight to dashboard
    if(sessionStorage.getItem("uniclub_token") && sessionStorage.getItem("uniclub_user")){
      window.location.href = "dashboard.html";
    }

    function showErr(msg){
      const b = document.getElementById("errorMsg");
      b.textContent = msg;
      b.classList.add("visible");
    }

    async function handleLogin(){
      const id  = document.getElementById("studentId").value.trim();
      const pw  = document.getElementById("password").value;
      const btn = document.getElementById("loginBtn");
      const err = document.getElementById("errorMsg");

      err.classList.remove("visible");
      err.textContent = "";

      if(!id || !pw){ showErr("⚠️ Please fill in both fields."); return; }

      btn.disabled = true;
      btn.textContent = "Signing in...";

      try {
        const snap = await getDoc(doc(db, "members", id));

        if(!snap.exists()){
          showErr("❌ Member not found. Check your Student ID.");
          btn.disabled = false; btn.textContent = "Sign In →";
          return;
        }

        const data = snap.data();
        if(data.password !== pw){
          showErr("❌ Wrong password. Please try again.");
          document.getElementById("password").value = "";
          btn.disabled = false; btn.textContent = "Sign In →";
          return;
        }

        // Create session keyed by uid — overwrites any previous session.
        // This instantly kicks out any other tab already logged in as this user.
        const token = Math.random().toString(36).slice(2) + Date.now().toString(36);
        try {
          await setDoc(doc(db, "sessions", id), { token, createdAt: Date.now() });
        } catch(e){
          console.warn("Session write failed — add /sessions rule to Firestore:", e.message);
        }

        // Store locally and redirect
        sessionStorage.setItem("uniclub_token", token);
        sessionStorage.setItem("uniclub_user", JSON.stringify({
          id,
          name:     data.name,
          initials: data.initials,
          role:     data.role,
          dept:     data.dept,
          email:    data.email
        }));

        window.location.href = "dashboard.html";

      } catch(e){
        console.error("Login error:", e);
        if(e.code === "permission-denied"){
          showErr("❌ Firebase permission denied. Update your Firestore security rules.");
        } else {
          showErr("❌ Connection error. Check internet / disable ad blocker.");
        }
        btn.disabled = false;
        btn.textContent = "Sign In →";
      }
    }

    document.getElementById("loginBtn").addEventListener("click", handleLogin);
    document.addEventListener("keydown", e => { if(e.key === "Enter") handleLogin(); });
  </script>
</body>
</html>
